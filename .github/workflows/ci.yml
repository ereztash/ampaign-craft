name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Hygiene baseline check
        run: bash scripts/check-hygiene-baseline.sh

      - name: Security audit
        # --audit-level=critical: xlsx has a known high CVE with no available fix;
        # we block on critical severity but track the xlsx issue separately.
        run: npm audit --audit-level=critical

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build
