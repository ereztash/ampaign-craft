name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Type check (strict ratchet — informational)
        # Tracks src/engine/ strict-mode violation count. Failures here do not
        # block merge; ratchet plan is in tsconfig.strict.json.
        run: npm run typecheck:strict 2>&1 | tee /tmp/strict.log || true
        continue-on-error: true

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Brand check (em-dash blocker)
        run: npm run check:no-em-dash

      - name: Brand check (HSL anchors)
        run: npm run check:brand

      - name: Hygiene baseline check
        run: bash scripts/check-hygiene-baseline.sh

      - name: Security audit
        # --audit-level=critical: xlsx has a known high CVE with no available fix;
        # we block on critical severity but track the xlsx issue separately.
        run: npm audit --audit-level=critical

      - name: Test
        run: npx vitest run

      - name: Critical-path coverage
        # Enforces 85% statement coverage on the three pivotal pricing engines.
        run: npm run test:coverage
        continue-on-error: true

      - name: Build
        run: npx vite build

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: npx playwright test
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [quality, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
