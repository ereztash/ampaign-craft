name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Type check (strict ratchet — informational)
        # Tracks src/engine/ strict-mode violation count. Failures here do not
        # block merge; ratchet plan is in tsconfig.strict.json.
        run: npm run typecheck:strict 2>&1 | tee /tmp/strict.log || true
        continue-on-error: true

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Brand check (em-dash blocker)
        run: npm run check:no-em-dash

      - name: Brand check (HSL anchors)
        run: npm run check:brand

      - name: Hygiene baseline check
        run: bash scripts/check-hygiene-baseline.sh

      - name: Security audit
        # --audit-level=critical: xlsx has a known high CVE with no available fix;
        # we block on critical severity but track the xlsx issue separately.
        run: npm audit --audit-level=critical

      - name: Test
        run: npx vitest run

      - name: Critical-path coverage
        # Enforces 85% statement coverage on the three pivotal pricing engines.
        run: npm run test:coverage
        continue-on-error: true

      - name: Build
        run: npx vite build

      - name: Consistency - manifest self-test
        run: npx tsx scripts/consistency/__tests__/manifest.test.ts

      - name: Consistency - numeric claims
        # Verifies every numeric count in README/CHOICES matches the codebase.
        # Known drift is tracked in scripts/consistency/allowlist.json with expiry dates.
        run: npx tsx scripts/consistency/audit-numeric.ts

      - name: Consistency - identity claims
        # Verifies archetype IDs, tier names, edge-function names, and route paths
        # are used consistently. Blockers fail the build; warnings are informational.
        run: npx tsx scripts/consistency/audit-identity.ts

      - name: Consistency - schema claims
        # Verifies RLS coverage for user-data tables and .env.example completeness.
        run: npx tsx scripts/consistency/audit-schema.ts

      - name: Upload consistency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consistency-reports
          path: reports/consistency/
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: npx playwright test
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [quality, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke - health endpoint
        id: smoke
        # Poll up to 3 min (18 x 10s) for Vercel edge propagation, then assert healthy
        run: |
          HEALTH_URL="${{ secrets.HEALTH_URL }}"
          if [ -z "$HEALTH_URL" ]; then
            echo "HEALTH_URL secret not set — skipping smoke check"
            exit 0
          fi
          for i in $(seq 1 18); do
            STATUS=$(curl -sf --max-time 10 "$HEALTH_URL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
            echo "attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Smoke passed"
              exit 0
            fi
            sleep 10
          done
          echo "Smoke FAILED after 3 min - health endpoint not healthy"
          exit 1

      - name: Auto-revert on smoke failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          git config user.email "ci@funnelforge.co.il"
          git config user.name "CI Smoke Guard"
          git revert --no-commit HEAD
          git commit -m "revert: auto-revert after smoke failure on $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
