name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # Weekly Monday 03:00 UTC - catches new advisories

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # dep-review (actions/dependency-review-action) was removed: the action
  # requires GitHub's Dependency Review API which is unavailable for this
  # repository plan, causing every run to crash before reaching any
  # warn-only logic. The npm-audit job below is the authoritative blocking
  # gate for high/critical production vulnerabilities and covers the same
  # threat model with no external API dependency.

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline
      - name: npm audit (high severity, production deps only)
        # Fail on any new high/critical that isn't allowlisted.
        # Allowlist rationale:
        #  - xlsx: pinned HIGH CVEs with no upstream fix (tracked separately)
        #  - @xmldom/xmldom: advisory range <0.8.13; we run 0.8.13 (patched).
        #    mammoth pins ^0.8.6, so a 0.9.x override would break it.
        run: |
          set -eo pipefail
          npm audit --omit=dev --json > audit.json || true
          node -e "
            const a = require('./audit.json');
            const ALLOW = new Set(['xlsx', '@xmldom/xmldom']);
            const vulns = Object.entries(a.vulnerabilities || {});
            const bad = vulns.filter(([name, v]) =>
              (v.severity === 'high' || v.severity === 'critical') && !ALLOW.has(name)
            );
            if (bad.length) {
              console.error('Non-allowlisted high/critical vulnerabilities:');
              for (const [name, v] of bad) console.error('  -', name, v.severity, v.via?.map?.((x) => x.title || x).join(' / '));
              process.exit(1);
            }
            console.log('npm audit clean (xlsx + @xmldom/xmldom allowlisted)');
          "

  brand-lock-warn:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Check brand-locked tokens
        id: brand_check
        run: |
          bash scripts/check-brand-locked.sh > brand_check_output.txt 2>&1
          cat brand_check_output.txt
          if grep -q "BRAND LOCK WARNING" brand_check_output.txt; then
            echo "has_violations=true" >> "$GITHUB_OUTPUT"
            echo "output<<EOF" >> "$GITHUB_OUTPUT"
            cat brand_check_output.txt >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Post PR warning comment
        if: steps.brand_check.outputs.has_violations == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const body = `## ⚠ Brand-Locked Token Warning

            This PR modifies a locked brand token (\`--brand-navy\`, \`--brand-growth\`, or \`--brand-canvas\`).

            These three colors constitute FunnelForge's **Distinctive Brand Asset moat** (Romaniuk 2012). Modifying them resets 5+ years of brand-recall compounding.

            **If this change is intentional:**
            1. Add \`[brand-amendment]\` to the PR description.
            2. Link to a design review approved by a product lead.
            3. Get approval from two senior reviewers.

            See \`docs/knowledge-and-moat.md\` § Brand-Asset Moat for the full amendment process.

            > This warning is informational — it does not block merge.`;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body,
              event: 'COMMENT',
            });
