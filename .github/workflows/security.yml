name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # Weekly Monday 03:00 UTC - catches new advisories

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dep-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # xlsx has pinned HIGH CVEs with no upstream fix; tracked separately.
          allow-ghsas: GHSA-4r6h-8v6p-xvw6,GHSA-5pgg-2g8v-p4x9

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline
      - name: npm audit (high severity, production deps only)
        # Fail on any new high/critical that isn't xlsx.
        run: |
          set -eo pipefail
          npm audit --omit=dev --json > audit.json || true
          node -e "
            const a = require('./audit.json');
            const vulns = Object.entries(a.vulnerabilities || {});
            const bad = vulns.filter(([name, v]) =>
              (v.severity === 'high' || v.severity === 'critical') && name !== 'xlsx'
            );
            if (bad.length) {
              console.error('Non-allowlisted high/critical vulnerabilities:');
              for (const [name, v] of bad) console.error('  -', name, v.severity, v.via?.map?.((x) => x.title || x).join(' / '));
              process.exit(1);
            }
            console.log('npm audit clean (xlsx allowlisted)');
          "
